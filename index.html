<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vekaletname Sistemi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; -webkit-tap-highlight-color: transparent; }

/* GİRİŞ */
#girisEkrani {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: linear-gradient(135deg, #1a237e, #283593);
  padding: 20px;
}
.girisKutu {
  background: white; padding: 36px 28px; border-radius: 16px;
  width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.girisKutu h1 { font-size: 20px; color: #1a237e; margin-bottom: 6px; }
.girisKutu p  { color: #888; font-size: 13px; margin-bottom: 24px; }
.girisKutu input {
  width: 100%; padding: 14px; border: 1.5px solid #ddd;
  border-radius: 10px; font-size: 16px; margin-bottom: 12px; outline: none;
}
.girisKutu input:focus { border-color: #1a237e; }
.girisKutu button {
  width: 100%; padding: 15px; background: #1a237e; color: white;
  border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600;
}
#girisHata { color: #e53935; font-size: 13px; margin-top: 10px; text-align: center; }

/* HEADER */
#anaEkran { display: none; min-height: 100vh; }
.header {
  background: #1a237e; color: white; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header h1 { font-size: 16px; font-weight: 600; }
.header-sag { display: flex; gap: 8px; }
.headerBtn {
  background: rgba(255,255,255,0.15); color: white; border: none;
  padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
}

.icerik { padding: 16px; max-width: 900px; margin: 0 auto; }

/* İSTATİSTİKLER */
.istatlar { display: flex; gap: 10px; margin-bottom: 16px; }
.istat {
  background: white; padding: 12px 16px; border-radius: 12px;
  flex: 1; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid;
}
.istat.yesil  { border-color: #2e7d32; }
.istat.turuncu{ border-color: #e65100; }
.istat.mavi   { border-color: #1565c0; }
.istat-sayi   { font-size: 22px; font-weight: 700; }
.istat.yesil .istat-sayi  { color: #2e7d32; }
.istat.turuncu .istat-sayi{ color: #e65100; }
.istat.mavi .istat-sayi   { color: #1565c0; }
.istat-etiket { font-size: 11px; color: #888; margin-top: 2px; }

/* ARAMA */
.aramaBar {
  background: white; padding: 12px; border-radius: 12px;
  margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.aramaBar input {
  width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0;
  border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 10px;
}
.aramaBar input:focus { border-color: #1a237e; }
.filtreBtns { display: flex; gap: 6px; flex-wrap: wrap; }
.filtreBtns button {
  padding: 8px 14px; border-radius: 20px; border: 1.5px solid #ddd;
  background: white; cursor: pointer; font-size: 13px; font-weight: 500;
}
.filtreBtns button.aktif { background: #1a237e; color: white; border-color: #1a237e; }

/* KARTLAR (mobil) */
.kartlar { display: flex; flex-direction: column; gap: 10px; }
.kart {
  background: white; border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #2e7d32;
}
.kart.eksik  { border-left-color: #e65100; background: #fff8f0; }
.kart.fazla  { border-left-color: #1565c0; background: #f0f4ff; }
.kart-ust    { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.kart-isim   { font-weight: 700; font-size: 15px; flex: 1; margin-right: 8px; }
.kart-sira   { font-size: 12px; color: #999; background: #f5f5f5; padding: 2px 8px; border-radius: 10px; }
.kart-detay  { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.kart-detay span { font-size: 13px; color: #666; }
.kart-detay .tc  { font-family: monospace; font-weight: 600; color: #333; }
.kart-alt    { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.durumBadge  {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.durumBadge.var    { background: #e8f5e9; color: #2e7d32; }
.durumBadge.eksik  { background: #fff3e0; color: #e65100; }
.durumBadge.fazla  { background: #e3f2fd; color: #1565c0; }
.btn {
  padding: 8px 16px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 600; display: inline-flex;
  align-items: center; gap: 5px;
}
.btn-ac    { background: #1a237e; color: white; }
.btn-indir { background: #e8eaf6; color: #1a237e; }
.btn-paylас { background: #25d366; color: white; }
.btn-kopyala { background: #f5f5f5; color: #555; }
.cokPdf { font-size: 11px; background: #1976d2; color: white; border-radius: 10px; padding: 2px 8px; }

/* PDF MODAL */
#pdfModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 200;
}
#pdfModal.acik { display: flex; flex-direction: column; }
.modalHeader {
  background: #1a237e; color: white; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modalBaslik { font-weight: 600; font-size: 14px; flex: 1; margin-right: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modalBtnlar { display: flex; gap: 8px; flex-shrink: 0; }
.modalBtn {
  background: rgba(255,255,255,0.15); color: white; border: none;
  padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
}
.modalBtn.wp  { background: #25d366; }
.modalBtn.kapat { font-size: 18px; padding: 4px 10px; }
#pdfFrame { flex: 1; border: none; width: 100%; }

/* YENİ VEKALET MODAL */
#yukleModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: flex-end; justify-content: center;
}
#yukleModal.acik { display: flex; }
.yukleKutu {
  background: white; border-radius: 20px 20px 0 0; padding: 24px 20px 32px;
  width: 100%; max-width: 500px;
}
.yukleKutu h2 { margin-bottom: 18px; color: #1a237e; font-size: 17px; }
.formGrup { margin-bottom: 12px; }
.formGrup label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 500; }
.formGrup input {
  width: 100%; padding: 12px; border: 1.5px solid #ddd;
  border-radius: 8px; font-size: 16px; outline: none;
}
.formGrup input:focus { border-color: #1a237e; }
.yukleKutu .butonlar { display: flex; gap: 10px; margin-top: 16px; }
.yukleKutu .butonlar button {
  flex: 1; padding: 14px; border-radius: 10px; border: none;
  cursor: pointer; font-size: 15px; font-weight: 600;
}
.iptalBtn  { background: #f5f5f5; color: #555; }
.kaydetBtn { background: #1a237e; color: white; }
#yukleIlerleme { margin-top: 8px; font-size: 13px; color: #555; text-align: center; }
#yukleniyor { text-align: center; padding: 40px; color: #888; font-size: 15px; }

/* Masa üstü tablo görünümü */
@media (min-width: 700px) {
  .kartlar { display: none; }
  .tabloKutu { display: block; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th { background: #1a237e; color: white; padding: 12px 14px; text-align: left; font-weight: 500; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.eksik { background: #fff8f0; }
  tbody tr.fazla { background: #f0f4ff; }
  td { padding: 10px 14px; }
  .btnGrup { display: flex; gap: 6px; }
  .tblBtn {
    padding: 5px 11px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .tbl-ac    { background: #1a237e; color: white; }
  .tbl-indir { background: #e8eaf6; color: #1a237e; }
  .tbl-wp    { background: #25d366; color: white; }
}
@media (max-width: 699px) {
  .tabloKutu { display: none; }
  #yukleModal { align-items: flex-end; }
}
</style>
</head>
<body>

<!-- GİRİŞ -->
<div id="girisEkrani">
  <div class="girisKutu">
    <h1>📄 Vekaletname Sistemi</h1>
    <p>Devam etmek için giriş yapın</p>
    <input type="email" id="email" placeholder="E-posta" value="praykpax@gmail.com">
    <input type="password" id="sifre" placeholder="Şifre" onkeydown="if(event.key==='Enter')girisYap()">
    <button onclick="girisYap()">Giriş Yap</button>
    <div id="girisHata"></div>
  </div>
</div>

<!-- ANA EKRAN -->
<div id="anaEkran">
  <div class="header">
    <h1>📄 Vekaletname</h1>
    <div class="header-sag">
      <button class="headerBtn" onclick="yukleModalAc()">+ Ekle</button>
      <button class="headerBtn" onclick="cikisYap()">Çıkış</button>
    </div>
  </div>

  <div class="icerik">
    <div class="istatlar">
      <div class="istat yesil">
        <div class="istat-sayi" id="varSayisi">—</div>
        <div class="istat-etiket">Mevcut</div>
      </div>
      <div class="istat turuncu">
        <div class="istat-sayi" id="eksikSayisi">—</div>
        <div class="istat-etiket">Eksik</div>
      </div>
      <div class="istat mavi">
        <div class="istat-sayi" id="toplamSayisi">—</div>
        <div class="istat-etiket">Toplam</div>
      </div>
    </div>

    <div class="aramaBar">
      <input type="text" id="aramaInput" placeholder="🔍  İsim veya TC ara..." oninput="filtrele()">
      <div class="filtreBtns">
        <button class="aktif" onclick="filtreDegistir('HEPSI',this)">Hepsi</button>
        <button onclick="filtreDegistir('VAR',this)">✓ Mevcut</button>
        <button onclick="filtreDegistir('EKSİK',this)">⚠ Eksik</button>
        <button onclick="filtreDegistir('FAZLA',this)">+ Fazla</button>
      </div>
    </div>

    <!-- MOBİL KARTLAR -->
    <div class="kartlar" id="kartlar">
      <div id="yukleniyor">Yükleniyor...</div>
    </div>

    <!-- MASAÜSTÜ TABLO -->
    <div class="tabloKutu">
      <table id="tablo" style="display:none">
        <thead>
          <tr>
            <th style="width:45px">#</th>
            <th>İsim</th>
            <th style="width:125px">TC</th>
            <th style="width:100px">Tarih</th>
            <th style="width:95px">Durum</th>
            <th style="width:150px">İşlem</th>
          </tr>
        </thead>
        <tbody id="tabloBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- PDF MODAL -->
<div id="pdfModal">
  <div class="modalHeader">
    <span class="modalBaslik" id="pdfBaslik"></span>
    <div class="modalBtnlar">
      <button class="modalBtn wp" onclick="wpPaylas()">WhatsApp</button>
      <button class="modalBtn" onclick="pdfIndir()">↓ İndir</button>
      <button class="modalBtn kapat" onclick="pdfKapat()">✕</button>
    </div>
  </div>
  <iframe id="pdfFrame" src=""></iframe>
</div>

<!-- YENİ VEKALET -->
<div id="yukleModal">
  <div class="yukleKutu">
    <h2>+ Yeni Vekalet Ekle</h2>
    <div class="formGrup">
      <label>İsim *</label>
      <input type="text" id="yeniIsim" placeholder="Ad Soyad">
    </div>
    <div class="formGrup">
      <label>TC Kimlik No</label>
      <input type="text" id="yeniTc" placeholder="11 haneli TC" maxlength="11" inputmode="numeric">
    </div>
    <div class="formGrup">
      <label>Tarih</label>
      <input type="text" id="yeniTarih" placeholder="GG.AA.YYYY">
    </div>
    <div class="formGrup">
      <label>PDF Dosyası *</label>
      <input type="file" id="yeniPdf" accept=".pdf" capture>
    </div>
    <div id="yukleIlerleme"></div>
    <div class="butonlar">
      <button class="iptalBtn" onclick="yukleModalKapat()">İptal</button>
      <button class="kaydetBtn" onclick="yeniVekaletKaydet()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hgijiuvzkpbmumeoxdwi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mqoEToEgbVaBKu_9ZZEg1Q_MFP_RTri';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let tumKayitlar = [];
let aktifFiltre = 'HEPSI';
let aktifPdfUrl = '';
let aktifPdfIsim = '';

async function girisYap() {
  const email = document.getElementById('email').value.trim();
  const sifre = document.getElementById('sifre').value;
  document.getElementById('girisHata').textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password: sifre });
  if (error) { document.getElementById('girisHata').textContent = 'Hatalı e-posta veya şifre'; return; }
  document.getElementById('girisEkrani').style.display = 'none';
  document.getElementById('anaEkran').style.display = 'block';
  kayitlariYukle();
}

async function cikisYap() { await sb.auth.signOut(); location.reload(); }

async function kayitlariYukle() {
  const { data } = await sb.from('vekaletnameler').select('*').order('sira_no');
  tumKayitlar = data || [];
  istatGuncelle();
  tabloGuncelle();
  document.getElementById('yukleniyor').style.display = 'none';
  document.getElementById('tablo').style.display = 'table';
}

function istatGuncelle() {
  document.getElementById('varSayisi').textContent   = tumKayitlar.filter(r=>r.durum==='VAR').length;
  document.getElementById('eksikSayisi').textContent = tumKayitlar.filter(r=>r.durum==='EKSİK').length;
  document.getElementById('toplamSayisi').textContent = tumKayitlar.length;
}

function filtreDegistir(f, btn) {
  aktifFiltre = f;
  document.querySelectorAll('.filtreBtns button').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  tabloGuncelle();
}
function filtrele() { tabloGuncelle(); }

function tabloGuncelle() {
  const q = document.getElementById('aramaInput').value.toLowerCase().trim();
  const liste = tumKayitlar.filter(r => {
    const fOk = aktifFiltre === 'HEPSI' || r.durum === aktifFiltre;
    const aOk = !q || (r.isim||'').toLowerCase().includes(q) || (r.tc||'').includes(q);
    return fOk && aOk;
  });

  // Mobil kartlar
  document.getElementById('kartlar').innerHTML = liste.map(r => {
    const cls = r.durum==='VAR'?'':'r.durum==="EKSİK"?"eksik":"fazla"';
    const kartCls = r.durum==='EKSİK'?'eksik':r.durum==='FAZLA'?'fazla':'';
    const badge = r.durum==='VAR'?'<span class="durumBadge var">✓ Mevcut</span>'
                : r.durum==='EKSİK'?'<span class="durumBadge eksik">⚠ Eksik</span>'
                : '<span class="durumBadge fazla">+ Fazla</span>';
    const btns = r.dosya_yolu
      ? `<button class="btn btn-ac" onclick="pdfAc('${r.dosya_yolu}','${esc(r.isim)}')">📄 Aç</button>
         <button class="btn btn-paylас" onclick="pdfPaylas('${r.dosya_yolu}','${esc(r.isim)}')">📤 Paylaş</button>`
      : '';
    return `<div class="kart ${kartCls}">
      <div class="kart-ust">
        <div class="kart-isim">${esc(r.isim)}</div>
        <div class="kart-sira">#${r.sira_no||''}</div>
      </div>
      <div class="kart-detay">
        ${r.tc?`<span class="tc">TC: ${r.tc}</span>`:''}
        ${r.tarih?`<span>📅 ${r.tarih}</span>`:''}
      </div>
      <div class="kart-alt">${badge}${btns}</div>
    </div>`;
  }).join('');

  // Masaüstü tablo
  document.getElementById('tabloBody').innerHTML = liste.map(r => {
    const trCls = r.durum==='EKSİK'?'eksik':r.durum==='FAZLA'?'fazla':'';
    const badge = r.durum==='VAR'?'<span class="durumBadge var">✓ Mevcut</span>'
                : r.durum==='EKSİK'?'<span class="durumBadge eksik">⚠ Eksik</span>'
                : '<span class="durumBadge fazla">+ Fazla</span>';
    const btns = r.dosya_yolu
      ? `<div class="btnGrup">
           <button class="tblBtn tbl-ac" onclick="pdfAc('${r.dosya_yolu}','${esc(r.isim)}')">Aç</button>
           <button class="tblBtn tbl-wp" onclick="pdfPaylas('${r.dosya_yolu}','${esc(r.isim)}')">📤</button>
           <button class="tblBtn tbl-indir" onclick="pdfIndirDosya('${r.dosya_yolu}','${esc(r.isim)}')">↓</button>
         </div>`
      : '<span style="color:#bbb;font-size:12px">PDF yok</span>';
    return `<tr class="${trCls}">
      <td style="color:#999;font-size:12px">${r.sira_no||''}</td>
      <td style="font-weight:500">${esc(r.isim)}</td>
      <td style="font-family:monospace;font-size:13px">${r.tc||'—'}</td>
      <td style="font-size:13px;color:#666">${r.tarih||'—'}</td>
      <td>${badge}</td>
      <td>${btns}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// PDF İŞLEMLERİ
async function pdfAc(dosyaYolu, isim) {
  const { data, error } = await sb.storage.from('vekaletler').createSignedUrl(dosyaYolu, 3600);
  if (error) { alert('Hata: ' + error.message); return; }
  aktifPdfUrl  = data.signedUrl;
  aktifPdfIsim = isim;
  document.getElementById('pdfBaslik').textContent = isim;
  document.getElementById('pdfFrame').src = data.signedUrl;
  document.getElementById('pdfModal').classList.add('acik');
}

function pdfKapat() {
  document.getElementById('pdfModal').classList.remove('acik');
  document.getElementById('pdfFrame').src = '';
  aktifPdfUrl = '';
}

function wpPaylas() {
  if (!aktifPdfUrl) return;
  const mesaj = encodeURIComponent(`📄 ${aktifPdfIsim}\n${aktifPdfUrl}`);
  window.open(`https://wa.me/?text=${mesaj}`, '_blank');
}

async function pdfPaylas(dosyaYolu, isim) {
  const { data, error } = await sb.storage.from('vekaletler').createSignedUrl(dosyaYolu, 3600);
  if (error) { alert('Hata: ' + error.message); return; }
  if (navigator.share) {
    try {
      await navigator.share({ title: isim, text: '📄 ' + isim, url: data.signedUrl });
      return;
    } catch(e) {}
  }
  // Fallback: WhatsApp
  const mesaj = encodeURIComponent(`📄 ${isim}\n${data.signedUrl}`);
  window.open(`https://wa.me/?text=${mesaj}`, '_blank');
}

async function pdfIndir() {
  if (!aktifPdfUrl) return;
  const a = document.createElement('a');
  a.href = aktifPdfUrl;
  a.download = aktifPdfIsim + '.pdf';
  a.click();
}

async function pdfIndirDosya(dosyaYolu, isim) {
  const { data, error } = await sb.storage.from('vekaletler').createSignedUrl(dosyaYolu, 60);
  if (error) { alert('Hata: ' + error.message); return; }
  const a = document.createElement('a');
  a.href = data.signedUrl;
  a.download = isim + '.pdf';
  a.click();
}

// YENİ VEKALET
function yukleModalAc()    { document.getElementById('yukleModal').classList.add('acik'); }
function yukleModalKapat() { document.getElementById('yukleModal').classList.remove('acik'); }

async function yeniVekaletKaydet() {
  const isim  = document.getElementById('yeniIsim').value.trim().toUpperCase();
  const tc    = document.getElementById('yeniTc').value.trim();
  const tarih = document.getElementById('yeniTarih').value.trim();
  const dosya = document.getElementById('yeniPdf').files[0];
  if (!isim || !dosya) { alert('İsim ve PDF zorunludur!'); return; }
  const ilerleme = document.getElementById('yukleIlerleme');
  ilerleme.textContent = 'Yükleniyor...';
  const maxSira = Math.max(...tumKayitlar.map(r=>r.sira_no||0), 0) + 1;
  const dosyaAdi = `${maxSira}/${dosya.name.replace(/[^a-zA-Z0-9.\-_]/g,'_')}`;
  const { error: upErr } = await sb.storage.from('vekaletler')
    .upload(dosyaAdi, dosya, { contentType: 'application/pdf', upsert: true });
  if (upErr) { ilerleme.textContent = 'Hata: ' + upErr.message; return; }
  const { error: dbErr } = await sb.from('vekaletnameler').insert({
    sira_no: maxSira, isim, tc: tc||null, tarih: tarih||null,
    dosya_yolu: dosyaAdi, durum: 'VAR', pdf_sayisi: 1
  });
  if (dbErr) { ilerleme.textContent = 'Hata: ' + dbErr.message; return; }
  ilerleme.textContent = '✓ Kaydedildi!';
  setTimeout(() => { yukleModalKapat(); kayitlariYukle(); }, 1000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { pdfKapat(); yukleModalKapat(); }
});
</script>
